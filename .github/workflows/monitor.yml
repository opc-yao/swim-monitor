name: SWIM Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Pythonセット
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ライブラリインストール
        run: pip install playwright

      - name: ブラウザインストール
        run: playwright install

      - name: 実行
        run: python main.py
        
      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: swim-screenshot
          path: swim.png
