name: SWIM Monitor

on:
  schedule:
    - cron: "*/5 * * * *"  # 5分ごと
  workflow_dispatch:       # 手動実行もできる

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v3

      - name: Pythonセット
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ライブラリインストール
        run: pip install playwright

      - name: ブラウザインストール
        run: playwright install

      - name: プログラム実行
        run: python main.py
